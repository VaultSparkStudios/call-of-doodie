name: Deploy Supabase Function

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-function.yml"
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate deploy secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF."
            exit 1
          fi

      - name: Deploy issue-run-token function
        run: supabase functions deploy issue-run-token --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy submit-score function
        run: supabase functions deploy submit-score --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy kofi-webhook function
        run: supabase functions deploy kofi-webhook --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy sync-studio-events function
        run: supabase functions deploy sync-studio-events --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
